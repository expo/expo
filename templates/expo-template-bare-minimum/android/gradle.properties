# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Parallel execution
org.gradle.parallel=true

# Build cache - reuses outputs from previous builds
org.gradle.caching=true

# Configuration cache - reuses task graph (Kotlin 2.x compatible)
org.gradle.configuration-cache=true

# File system watching for faster incremental builds
org.gradle.vfs.watch=true

# Kotlin incremental compilation
kotlin.incremental=true

# Keep Kotlin compiler daemon warm between builds
kotlin.daemon.enabled=true

# AndroidX
android.useAndroidX=true

# Non-transitive R classes (reduces R class size)
android.nonTransitiveRClass=true

# Disable BuildConfig by default
android.defaults.buildfeatures.buildconfig=false
