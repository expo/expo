name: Updates E2E enabled (Android)
defaults:
  tools:
    yarn: '1.22.22'

on:
  push:
    branches: ['doug/sdk-52-workflow-testing']

jobs:
  setup:
    runs_on: linux-large-nested-virtualization
    steps:
      - uses: eas/checkout
      - uses: eas/use_npm_token
      - uses: eas/install_node_modules
      - name: Set up Updates E2E enabled project
        id: setup
        run: |
          ./packages/expo-updates/e2e/setup/create-eas-project.ts
          ls -la ../updates-e2e
      - name: Build E2E project
        id: build
        working_directory: ../updates-e2e
        run: | 
          yarn generate-test-update-bundles
          npx detox build -c android.debug
          avdmanager list avd
      - name: Test E2E project
        id: test
        env:
          UPDATES_HOST: "localhost"
          UPDATES_PORT: "4747"
        working_directory: ../updates-e2e
        run: |
          npx detox test -c android.debug
