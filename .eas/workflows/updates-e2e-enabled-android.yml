name: Updates E2E enabled (Android)
defaults:
  tools:
    yarn: '1.22.22'

on:
  push:
    branches: ['doug/sdk-52-workflow-testing']

jobs:
  setup:
    runs_on: linux-large-nested-virtualization
    steps:
      - uses: eas/checkout
      - uses: eas/use_npm_token
      - uses: eas/install_node_modules
      - name: Set up Android simulator
        id: setupsimulator
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          sudo apt-get update --yes
          sudo apt-get --quiet install openjdk-17-jdk openjdk-17-jre libc6 libdbus-1-3 libfontconfig1 libgcc1 libpulse0 libtinfo5 libx11-6 libxcb1 libxdamage1 libnss3 libxcomposite1 libxcursor1 libxi6 libxext6 libxfixes3 zlib1g libgl1 pulseaudio socat --yes
          sdkmanager --install "system-images;android-31;google_apis;x86_64"
          avdmanager --verbose create avd --force --name "pixel_4" --device "pixel_4" --package "system-images;android-31;google_apis;x86_64"
      - name: Set up Updates E2E enabled project
        id: setup
        run: |
          yarn --silent ts-node --transpile-only ./packages/expo-updates/e2e/setup/create-eas-project.ts
          ls -la ../updates-e2e
      - name: Build E2E project
        id: build
        working_directory: ../updates-e2e
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: | 
          yarn generate-test-update-bundles
          npx detox build -c android.debug
          avdmanager list avd
      - name: Test E2E project
        id: test
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          UPDATES_HOST: "localhost"
          UPDATES_PORT: "4747"
        working_directory: ../updates-e2e
        run: |
          (cd $ANDROID_HOME/tools; emulator -avd pixel_4 -no-audio -no-boot-anim &)
          yarn check-android-emulator
          npx detox test -c android.debug
