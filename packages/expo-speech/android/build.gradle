plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'host.exp.exponent'
version = '56.0.3'

android {
  namespace "expo.modules.speech"
  defaultConfig {
    versionCode 18
    versionName "56.0.3"
  }
}

dependencies {
  testImplementation 'io.mockk:mockk:1.14.9'
  testImplementation 'junit:junit:4.13.2'
}
