buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath("org.jetbrains.kotlin.plugin.compose:org.jetbrains.kotlin.plugin.compose.gradle.plugin:${kotlinVersion}")
  }
}

apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

group = 'expo.modules.widgets'
version = '56.0.11'

expoModule {
  canBePublished false
}

def reactNativeArchitectures() {
  def value = project.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

android {
  namespace "expo.modules.widgets"
  defaultConfig {
    versionCode 1
    versionName '56.0.11'

    externalNativeBuild {
      cmake {
        abiFilters(*reactNativeArchitectures())
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    prefab true
    compose true
  }

  packagingOptions {
    excludes += [
      "**/libc++_shared.so",
      "**/libhermesvm.so",
    ]
  }
}

dependencies {
  implementation 'com.facebook.react:react-android'
  implementation 'com.facebook.react:hermes-android'
  if (findProject(':expo-ui') != null) {
    implementation project(':expo-ui')
  } else {
    implementation 'expo.modules.ui:expo.modules.ui:+'
  }
  implementation 'androidx.compose.foundation:foundation-android:1.10.6'
  implementation 'androidx.compose.ui:ui-android:1.10.6'
  api 'androidx.glance:glance:1.2.0-rc01'
  api 'androidx.glance:glance-appwidget:1.2.0-rc01'
}
