import org.apache.tools.ant.taskdefs.condition.Os

plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.widgets'
version = '56.0.15'

def expoWidgetsPackageDirFile = project.projectDir.parentFile
def expoWidgetsPackageDir = expoWidgetsPackageDirFile.absolutePath
def expoWidgetsProjectRoot = rootDir.absoluteFile.parentFile.absolutePath
def expoWidgetsLayoutRegistryConfigFile = file("$expoWidgetsProjectRoot/android/app/src/main/expo-widgets-layout-registry.config.json")
def expoWidgetsGeneratedResDir = objects.directoryProperty()
expoWidgetsGeneratedResDir.set(layout.buildDirectory.dir("generated/expo-widgets/res"))
def expoWidgetsBundleOutput = expoWidgetsGeneratedResDir
  .file("raw/expo_widgets_bundle.bundle")
  .get()
  .asFile
def expoWidgetsLayoutRegistryOutput = expoWidgetsGeneratedResDir
  .file("raw/expo_widgets_layout_registry.json")
  .get()
  .asFile

def config = project.hasProperty("react") ? project.react : []
def nodeExecutableAndArgs = config.nodeExecutableAndArgs ?: ["node"]

expoModule {
  canBePublished false
}

def reactNativeArchitectures() {
  def value = project.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

android {
  namespace "expo.modules.widgets"
  defaultConfig {
    versionCode 1
    versionName '56.0.15'

    externalNativeBuild {
      cmake {
        def cppArguments = [
          "-DANDROID_STL=c++_shared",
          "-DREACT_NATIVE_DIR=${expoModule.reactNativeDir}",
          "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON",
        ]

        abiFilters(*reactNativeArchitectures())
        arguments(*cppArguments)
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    prefab true
  }

  packagingOptions {
    excludes += [
      "**/libc++_shared.so",
      "**/libhermesvm.so",
    ]
  }
}

def generateExpoWidgetsBundle = tasks.register("generateExpoWidgetsBundle", Exec) {
  description = "expo-widgets: Generate the Android widget JS bundle resource."

  inputs.dir project.fileTree(file("$expoWidgetsPackageDir/bundle")) {
    exclude "build/**"
  }
  inputs.file file("$expoWidgetsPackageDir/metro.config.js")
  inputs.file file("$expoWidgetsPackageDir/scripts/build-bundle.mjs")
  outputs.file(expoWidgetsBundleOutput)

  def command = [
    *nodeExecutableAndArgs,
    "$expoWidgetsPackageDir/scripts/build-bundle.mjs",
    expoWidgetsProjectRoot,
    "android",
    expoWidgetsBundleOutput.absolutePath
  ]

  if (Os.isFamily(Os.FAMILY_WINDOWS)) {
    commandLine("cmd", "/c", *command)
  } else {
    commandLine(*command)
  }
}

def generateExpoWidgetsLayoutRegistry = tasks.register("generateExpoWidgetsLayoutRegistry", Exec) {
  description = "expo-widgets: Generate the Android widget layout registry resource."

  inputs.dir project.fileTree(file("$expoWidgetsPackageDir/bundle")) {
    exclude "build/**"
  }
  inputs.file file("$expoWidgetsPackageDir/layout-registry.metro.config.js")
  inputs.file file("$expoWidgetsPackageDir/metro.config.js")
  inputs.file file("$expoWidgetsPackageDir/scripts/build-layout-registry.mjs")
  inputs.file file("$expoWidgetsPackageDir/bundle/layout-registry-entry.js")
  inputs.file(expoWidgetsLayoutRegistryConfigFile).optional()
  outputs.file(expoWidgetsLayoutRegistryOutput)

  def command = [
    *nodeExecutableAndArgs,
    "$expoWidgetsPackageDir/scripts/build-layout-registry.mjs",
    expoWidgetsProjectRoot,
    "android",
    expoWidgetsLayoutRegistryOutput.absolutePath
  ]

  if (Os.isFamily(Os.FAMILY_WINDOWS)) {
    commandLine("cmd", "/c", *command)
  } else {
    commandLine(*command)
  }
}

def generateExpoWidgetsResources = tasks.register("generateExpoWidgetsResources") {
  dependsOn(generateExpoWidgetsBundle, generateExpoWidgetsLayoutRegistry)
  outputs.dir(expoWidgetsGeneratedResDir)
}

androidComponents {
  onVariants(selector().all()) { variant ->
    variant.sources.res.addGeneratedSourceDirectory(generateExpoWidgetsResources) {
      expoWidgetsGeneratedResDir
    }
  }
}

dependencies {
  implementation 'com.facebook.react:react-android'
  implementation 'com.facebook.react:hermes-android'
  implementation expoModule.getExpoDependency("expo-ui")
  api 'io.github.jakex7.peek:peek-emittables:0.1.0'
}
