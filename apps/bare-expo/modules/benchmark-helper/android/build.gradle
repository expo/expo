plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'host.exp.exponent'
version = '1.0.0'

expoModule {
  canBePublished false
}

android {
  namespace "expo.modules.benchmarkhelper"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'androidx.appcompat:appcompat:1.7.1'
}
