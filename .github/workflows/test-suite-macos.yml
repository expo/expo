name: Test Suite macOS

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - .github/workflows/test-suite-macos.yml
      - apps/bare-expo/macos/**
      - packages/expo/**
      - packages/expo-asset/**
      - packages/expo-clipboard/**
      - packages/expo-constants/**
      - packages/expo-crypto/**
      - packages/expo-dev-client/**
      - packages/expo-dev-launcher/**
      - packages/expo-dev-menu/**
      - packages/expo-eas-client/**
      - packages/expo-file-system/**
      - packages/expo-font/**
      - packages/expo-keep-awake/**
      - packages/expo-linking/**
      - packages/expo-local-authentication/**
      - packages/expo-manifests/**
      - packages/expo-mesh-gradient/**
      - packages/expo-modules-autolinking/**
      - packages/expo-modules-core/**
      - packages/expo-network/**
      - packages/expo-sqlite/**
      - packages/expo-structured-headers/**
      - packages/expo-symbols/**
      - packages/expo-updates-interface/**
      - packages/expo-updates/**
      - packages/expo-web-browser/**
      - '!packages/**/android/**'
      # Common ignores from detect-platform-change action
      - '!**/*.md'
      - '!**/LICENSE*'
      - '!**/.gitignore'
      - '!**/CHANGELOG*'
      - '!**/.npmignore'
      - '!**/.eslintrc*'
      - '!**/.prettierrc*'
      - '!**/.gitattributes'
      - '!**/.watchmanconfig'
      - '!**/.fingerprintignore'
      - '!**/__tests__/**'
      - '!**/__mocks__/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    runs-on: macos-26
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: 🔨 Switch to Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app
      - name: 🍺 Install required tools
        run: |
          brew install watchman || true
      - name: ➕ Add `bin` to GITHUB_PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: 💎 Setup Ruby and install gems
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
        with:
          bundler-cache: true
          ruby-version: 3.2.2
      - name: 🔨 Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - name: 🔨 Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: ♻️ Restore caches
        uses: ./.github/actions/expo-caches
        id: expo-caches
        with:
          bare-expo-macos-pods: 'true'
      - name: 📦 Install node modules
        run: pnpm install --frozen-lockfile
      - name: 🕵️ Debug CocoaPods lockfiles
        run: git diff Podfile.lock Pods/Manifest.lock
        working-directory: apps/bare-expo/macos
        continue-on-error: true
      - name: 🌳 Display pod environment
        run: pod env
        working-directory: apps/bare-expo/macos
      - name: 🖥️ Run bare-expo macos setup script
        run: ./scripts/setup-macos-project.sh
        working-directory: apps/bare-expo/
      - name: 🥥 Install pods in apps/bare-expo/macos
        if: steps.expo-caches.outputs.bare-expo-pods-hit != 'true'
        run: pod install
        working-directory: apps/bare-expo/macos
      - name: 🏗️ Build macOS project
        run: |
          set -o pipefail
          xcodebuild -workspace macos/BareExpo-macOS.xcworkspace -scheme ExpoMacOS-macOS -sdk macosx -derivedDataPath "macos/build" | tee xcodebuild.log | xcpretty
        working-directory: apps/bare-expo
        timeout-minutes: 55
        env:
          EXPO_DEBUG: 1
          NODE_ENV: production
      - name: 📄 Upload xcodebuild log
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: bare-expo-macos-xcodebuild-log
          path: apps/bare-expo/xcodebuild.log
      - name: 📸 Upload builds
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: bare-expo-macos-builds
          path: apps/bare-expo/macos/build/BareExpo.app
      - name: 🔔 Notify on Slack
        uses: ./.github/actions/slack-notify
        if: failure() && (github.event.ref == 'refs/heads/main' || startsWith(github.event.ref, 'refs/heads/sdk-')) && github.repository == 'expo/expo'
        with:
          webhook: ${{ secrets.slack_webhook_ios }}
          channel: '#expo-ios'
          author_name: Test Suite (macOS)
