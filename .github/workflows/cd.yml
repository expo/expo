name: 🚀 CD Deployment

on:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: '1.75'
  NODE_VERSION: '18'

permissions:
  contents: read

jobs:
  build-release:
    name: 📦 Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build Rust
        run: cd rust && cargo build --release
      - name: Build TypeScript
        run: npm ci && npm run build
      - name: Create Release Archive
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p release/maurimesh-$VERSION
          cp -r rust/target/release/* release/maurimesh-$VERSION/
          cp -r dist/* release/maurimesh-$VERSION/ 2>/dev/null || true
          cd release && tar -czf maurimesh-$VERSION.tar.gz maurimesh-$VERSION/
      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release/

  deploy-mobile:
    name: 📱 Deploy Mobile
    runs-on: macos-latest
    needs: build-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Expo
        run: npm install -g eas-cli
      - name: Build iOS
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build Android
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  create-release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, deploy-mobile]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Release
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
