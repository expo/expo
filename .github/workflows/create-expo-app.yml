name: Create Expo App

on:
  push:
    branches: [main, 'sdk-*']
    paths:
      - .github/workflows/create-expo-app.yml
      - packages/create-expo/**
      - pnpm-lock.yaml
  pull_request:
    paths:
      - .github/workflows/create-expo-app.yml
      - packages/create-expo/**
      - pnpm-lock.yaml
  schedule:
    - cron: 0 14 * * *

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 100
      - name: ⬇️ Fetch commits from base branch
        run: git fetch origin ${{ github.event.before || github.base_ref || 'main' }}:${{ github.event.before || github.base_ref || 'main' }} --depth 100
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      - name: 🏗️ Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.x
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - name: 📦 Install node modules in root dir
        run: pnpm install --frozen-lockfile
      - name: 🛠 Build create-expo
        run: pnpm run prepublishOnly
        working-directory: packages/create-expo
      - name: E2E Test create-expo
        run: pnpm test:e2e
        working-directory: packages/create-expo
