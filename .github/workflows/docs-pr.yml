name: Docs Website PR

defaults:
  run:
    shell: bash
    working-directory: docs

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-pr.yml'
    types:
      - opened
      - labeled
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-pr:
    runs-on: ubuntu-24.04
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🏗️ Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - name: ⬢ Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: ♻️ Restore caches
        uses: ./.github/actions/expo-caches
        id: expo-caches
        with:
          pnpm-docs: 'true'
      - name: ➕ Add `bin` to GITHUB_PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: 📦 Install docs deps
        if: steps.expo-caches.outputs.pnpm-docs-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: 🧪 Run Docs tests
        run: pnpm test
      - name: 🧪 Test Cloudflare worker and routes
        run: pnpm test:worker
      - name: 🚨 Lint Docs website code
        env:
          NODE_ENV: production
        run: pnpm lint --max-warnings 0
      - name: 📦 Read Vale version
        id: vale-version
        run: echo "version=$(node -p "require('./.vale-version.json').version")" >> "$GITHUB_OUTPUT"
      - name: 💬 Lint Docs website content
        uses: vale-cli/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2.1.1
        with:
          version: ${{ steps.vale-version.outputs.version }}
          reporter: github-pr-check
          files: '["docs/pages", "docs/scenes", "docs/README.md"]'
          vale_flags: --config=./docs/.vale.ini --glob=!{docs/pages/versions/latest,docs/pages/versions/latest/**,docs/pages/internal,docs/pages/internal/**}
          fail_on_error: true
          # Override vale-action's older bundled reviewdog to avoid large-diff limits.
          reviewdog_url: https://github.com/reviewdog/reviewdog/releases/download/v0.21.0/reviewdog_0.21.0_Linux_x86_64.tar.gz
      - name: 🔗 Lint pages links
        run: pnpm lint-links --quiet
      - name: 🏗️ Build Docs website
        if: contains(github.event.pull_request.labels.*.name, 'preview')
        run: pnpm export
        timeout-minutes: 20
        env:
          # NOTE(@krystofwoldrich): Missing token won't fail the build
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 🚀 Deploy Docs website
        if: contains(github.event.pull_request.labels.*.name, 'preview')
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=pr-${{ github.event.pull_request.number }}
          workingDirectory: docs
      - name: 💬 Comment with preview URL
        if: contains(github.event.pull_request.labels.*.name, 'preview')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.EXPO_BOT_GITHUB_TOKEN }}
          script: |
            const body = '📘 Your docs [preview website](https://pr-${{ github.event.pull_request.number }}.expo-docs.pages.dev/) is ready!';
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.user.login.startsWith('expo-bot') && c.body.includes('📘 Your docs'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
