name: Android Unit Tests

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - .github/workflows/android-unit-tests.yml
      - apps/expo-go/android/**
      - fastlane/**
      - packages/**/android/**
      - tools/**
      - pnpm-lock.yaml
      - '!packages/@expo/cli/**'
      - '!tools/src/commands/GenerateDocsAPIData.ts'
  pull_request:
    paths:
      - .github/workflows/android-unit-tests.yml
      - apps/expo-go/android/**
      - fastlane/**
      - packages/**/android/**
      - tools/**
      - pnpm-lock.yaml
      - '!packages/@expo/cli/**'
      - '!tools/src/commands/GenerateDocsAPIData.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 100
    env:
      ORG_GRADLE_PROJECT_reactNativeArchitectures: x86_64
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m
    steps:
      - name: 👀 Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: 🔨 Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - name: ⬢ Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: 🧹 Cleanup GitHub Linux runner disk space
        uses: ./.github/actions/cleanup-linux-disk-space
      - name: 🔨 Use JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: ♻️ Restore caches
        uses: ./.github/actions/expo-caches
        id: expo-caches
        with:
          react-native-gradle-downloads: 'true'
          gradle: 'true'
      - name: ➕ Add `bin` to GITHUB_PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: 📦 Install node modules
        run: pnpm install --frozen-lockfile
      - name: 📦 Install react-native submodule dependencies
        run: yarn install
        working-directory: react-native-lab/react-native
      - name: 💅 Run Spotless lint check
        working-directory: apps/expo-go/android
        run: ./gradlew spotlessCheck || { echo '::error Spotless lint failed. Run `./gradlew spotlessApply` from `apps/expo-go/android` to automatically fix formatting.' && exit 1; }
      - name: 🎸 Run native Android unit tests
        if: always()
        timeout-minutes: 30
        run: pnpm expotools native-unit-tests --platform android
      - name: 💾 Save test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: packages/*/android/build/test-results/**/*xml
