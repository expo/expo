name: Smoke Test Precompiled iOS XCFrameworks

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - .github/workflows/ios-prebuild-xcframeworks-smoke.yml
      - tools/src/prebuilds/**
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Switch to Xcode 26.2
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app

      - name: Add bin to GITHUB_PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install node modules
        run: pnpm install --frozen-lockfile

      - name: Prebuild XCFrameworks (Debug, smoke test)
        run: et prebuild -f Debug -v expo-modules-core expo-media-library
