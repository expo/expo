name: Publish Canaries

on:
  workflow_dispatch:
      inputs:
        skip-ios-prebuilds:
          description: Skip bundling iOS xcframeworks
          type: boolean
          default: false
  pull_request:
    paths:
      - .github/workflows/publish-canaries.yml
  schedule:
    - cron: 0 1 * * * # Nightly at 1:00 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-canaries:
    if: github.repository == 'expo/expo'
    runs-on: macos-26
    timeout-minutes: 120
    env:
      NODE_AUTH_TOKEN: ${{ secrets.EXPO_BOT_NPM_TOKEN }}
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - name: 🔨 Switch to Xcode 26.4.1
        run: sudo xcode-select --switch /Applications/Xcode_26.4.1.app
      - name: 🔨 Add bin to GITHUB_PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH
      - name: 🔨 Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - name: ⬢ Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/
      - name: 🔨 Use JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 📦 Publish canaries
        run: pnpm expotools publish-packages --canary ${{ github.event_name != 'workflow_dispatch' && '--dry' || '' }} ${{ inputs.skip-ios-prebuilds && '--skip-ios-prebuilds' || '' }}
        env:
          FORCE_COLOR: '2'
      - name: 🔔 Notify on Slack
        uses: ./.github/actions/slack-notify
        if: failure() && github.event_name == 'schedule'
        with:
          webhook: ${{ secrets.slack_webhook_api }}
          author_name: Publish Canaries
          fields: job,message,author,took
